<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>School Visual Analytics System</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #f4f6fb;
            --surface: #ffffff;
            --border: #e2e8f4;
            --accent: #2563eb;
            --accent2: #059669;
            --accent3: #d97706;
            --accent4: #dc2626;
            --accent5: #4f46e5;
            --text: #0f172a;
            --muted: #64748b;
            --light: #f1f5f9;
            --radius: 14px;
            --shadow: 0 1px 4px rgba(15,23,42,.07),0 4px 16px rgba(15,23,42,.06);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif}
        nav{display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:64px;background:var(--surface);border-bottom:1.5px solid var(--border);position:sticky;top:0;z-index:100}
        .nav-brand{font-family:'Playfair Display',serif;font-weight:700;font-size:1.2rem;color:var(--accent);display:flex;align-items:center;gap:10px}
        .nav-icon{width:34px;height:34px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff}
        .nav-brand span{color:var(--text)}
        .nav-tabs{display:flex;gap:4px}
        .nav-tab{padding:8px 18px;border-radius:8px;border:none;background:transparent;color:var(--muted);font-weight:500;cursor:pointer}
        .nav-tab:hover{background:var(--light)}
        .nav-tab.active{background:#eff6ff;color:var(--accent);font-weight:600}
        main{padding:36px 40px;max-width:1400px;margin:0 auto}
        .page-header{margin-bottom:24px}
        .page-header h2{font-family:'Playfair Display',serif;font-size:1.85rem;font-weight:700}
        .search-row{display:flex;gap:10px;margin-top:16px}
        .search-box{flex:1;display:flex;align-items:center;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:0 16px;gap:10px}
        .search-box input{background:none;border:none;outline:none;width:100%;padding:13px 0}
        .btn{padding:13px 24px;border-radius:var(--radius);border:none;font-weight:600;cursor:pointer}
        .btn-primary{background:var(--accent);color:#fff}
        .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:16px;margin-bottom:26px}
        .kpi-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px;position:relative}
        .kpi-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
        .kpi-icon.blue{background:#eff6ff}
        .kpi-label{font-size:.76rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
        .kpi-value{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:700}
        .section-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
        .dot{width:8px;height:8px;border-radius:50%}
        .dot.blue{background:var(--accent)}
        .dot.green{background:var(--accent2)}
        .dot.yellow{background:var(--accent3)}
        .dot.purple{background:var(--accent5)}
        .dot.red{background:var(--accent4)}
        .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
        .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:20px}
        @media(max-width:1000px){.grid-3{grid-template-columns:1fr}}
        @media(max-width:900px){.grid-2{grid-template-columns:1fr}}
        .chart-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px}
        .chart-card canvas{max-height:220px; width:100%}
        .table-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
        table{width:100%;border-collapse:collapse}
        th{background:#f8fafc;padding:11px 16px;text-align:left;font-size:.75rem;font-weight:600;color:var(--muted)}
        td{padding:11px 16px;border-top:1px solid #f1f5f9;font-size:.87rem}
        .striped-table tbody tr:nth-child(even){background:#f8fafc}
        .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600}
        .badge-Ap,.badge-A{background:#dcfce7;color:#15803d}
        .badge-B{background:#dbeafe;color:#1d4ed8}
        .badge-C{background:#fef9c3;color:#a16207}
        .badge-D{background:#ffedd5;color:#c2410c}
        .badge-F{background:#fee2e2;color:#b91c1c}
        .profile-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:26px;display:flex;gap:22px;margin-bottom:20px}
        .avatar{width:66px;height:66px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#4f46e5);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:1.4rem}
        .grade-big{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:700;color:var(--accent2);background:#f0fdf4;width:62px;height:62px;border-radius:13px;display:flex;align-items:center;justify-content:center;margin-left:auto}
        .loading{text-align:center;padding:60px;color:var(--muted)}
        .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .empty{text-align:center;padding:60px;color:var(--muted)}
        .page{display:none}.page.active{display:block}
        .multi-item{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:10px;cursor:pointer}
        select.stype{padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--surface)}
        .fade-in{animation:fi .35s ease}
        @keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1}}
        
        .activity-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }
        .activity-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow);
        }
        .activity-card:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
            box-shadow: var(--shadow-lg);
        }
        .activity-card.active {
            border-color: var(--accent);
            background: #eff6ff;
            color: var(--accent);
            font-weight: 600;
        }
        .activity-card-name {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }
        .activity-card-stats {
            font-size: 0.7rem;
            color: var(--muted);
        }
        .scrollable-table {
            overflow: visible;
        }
        .activities-tables-wrapper {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .activities-subsection {
            margin-top: 0;
        }
    </style>
</head>
<body>
<nav>
    <div class="nav-brand"><div class="nav-icon">🏫</div>School<span>Analytics</span></div>
    <div class="nav-tabs">
        <button class="nav-tab active" onclick="showPage('dashboard',this)">📊 Dashboard</button>
        <button class="nav-tab" onclick="showPage('student',this)">👤 Student</button>
        <button class="nav-tab" onclick="showPage('class',this)">📚 Class</button>
        <button class="nav-tab" onclick="showPage('activity',this)">🏆 Activities</button>
    </div>
</nav>
<main>
    <div id="page-dashboard" class="page active"><div class="page-header"><h2>School Overview</h2></div><div id="dashboard-content"><div class="loading"><div class="spinner"></div>Loading...</div></div></div>
    <div id="page-student" class="page"><div class="page-header"><h2>Student Analytics</h2><p>Search by name or ID</p><div class="search-row"><div class="search-box"><input id="student-input" placeholder="Name or ID..." onkeydown="if(event.key==='Enter')searchStudent()"/></div><button class="btn btn-primary" onclick="searchStudent()">Search</button></div></div><div id="student-content"><div class="empty">👤 Enter a student name or ID</div></div></div>
    <div id="page-class" class="page"><div class="page-header"><h2>Class Analytics</h2><div class="search-row"><select id="class-num" class="stype"><option value="">Class</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option><option>10</option></select><select id="class-sec" class="stype"><option value="">Section</option><option>A</option><option>B</option><option>C</option></select><button class="btn btn-primary" onclick="searchClass()">View Class</button></div></div><div id="class-content"><div class="empty">📚 Select a class and section</div></div></div>
    <div id="page-activity" class="page"><div class="page-header"><h2>Co-Curricular Activities</h2><p>Click on any activity card to see detailed report</p></div><div id="activity-grid" class="activity-grid"></div><div id="activity-content"><div class="loading"><div class="spinner"></div>Loading activities...</div></div></div>
</main>

<script>
    const API = 'http://localhost:5001/api/school';
    let charts = {};

    function destroyChart(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }
    function makeChart(id, type, labels, datasets, extra = {}) {
        destroyChart(id);
        const ctx = document.getElementById(id);
        if (!ctx) return;
        charts[id] = new Chart(ctx, { type, data: { labels, datasets }, options: { responsive: true, maintainAspectRatio: true, ...extra } });
    }
    function grade(v) { if (v >= 90) return 'A+'; if (v >= 80) return 'A'; if (v >= 70) return 'B'; if (v >= 60) return 'C'; if (v >= 50) return 'D'; return 'F'; }
    function badge(g) { const s = g.replace('+', 'p'); return `<span class="badge badge-${s}">${g}</span>`; }
    function av(n) { return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }

    function showPage(name, btn) {
        document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
        document.getElementById('page-'+name).classList.add('active');
        if(btn) btn.classList.add('active');
        if(name==='dashboard') loadDashboard();
        if(name==='activity') loadActivityGrid();
    }

    async function loadDashboard() {
        const el = document.getElementById('dashboard-content');
        el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
        try {
            const d = await (await fetch(`${API}/dashboard`)).json();
            renderDash(d);
        } catch(e) { el.innerHTML = '<div class="empty">⚠️ Cannot connect to API</div>'; }
    }

    function renderDash(d) {
        const k = d.kpi, bc = d.bestClass;
        const topStudentsHtml = d.topStudents.map((s,i)=>`
            <tr>
                <td style="font-weight:700">${i+1}</td>
                <td style="font-weight:600">${s.Name}</td>
                <td>${s.Class}-${s.Section}</td>
                <td><strong>${s.AvgMarks}%</strong></td>
                <td>${badge(s.OverallGrade)}</strong>
            </tr>
        `).join('');
        
        document.getElementById('dashboard-content').innerHTML = `<div class="fade-in">
            <div class="kpi-grid">
                <div class="kpi-card"><div class="kpi-icon blue">👨‍🎓</div><div class="kpi-label">Total Students</div><div class="kpi-value">${k.TotalStudents}</div></div>
                <div class="kpi-card"><div class="kpi-icon blue">📈</div><div class="kpi-label">School Avg Marks</div><div class="kpi-value">${k.SchoolAvgMarks}%</div></div>
                <div class="kpi-card"><div class="kpi-icon blue">📅</div><div class="kpi-label">Avg Attendance</div><div class="kpi-value">${k.SchoolAvgAttendance}%</div></div>
                <div class="kpi-card"><div class="kpi-icon blue">✅</div><div class="kpi-label">Pass %</div><div class="kpi-value">${k.PassPercentage}%</div></div>
                <div class="kpi-card"><div class="kpi-icon blue">🏆</div><div class="kpi-label">Best Class</div><div class="kpi-value">${bc.Class}-${bc.Section}</div></div>
            </div>
            <div class="grid-2">
                <div class="chart-card"><div class="section-title"><span class="dot blue"></span>Class-wise Avg Marks</div><canvas id="ch-cm"></canvas></div>
                <div class="chart-card"><div class="section-title"><span class="dot green"></span>Class-wise Attendance</div><canvas id="ch-ca"></canvas></div>
            </div>
            <div class="grid-2">
                <div class="chart-card"><div class="section-title"><span class="dot yellow"></span>Activity Participation</div><canvas id="ch-act"></canvas></div>
                <div class="chart-card"><div class="section-title"><span class="dot purple"></span>Pass % by Class</div><canvas id="ch-pass"></canvas></div>
            </div>
            <div class="section-title">🏅 Top 10 Students</div>
            <div class="table-card">
                <table>
                    <thead><tr><th>Rank</th><th>Name</th><th>Class</th><th>Avg Marks</th><th>Grade</th></tr></thead>
                    <tbody>${topStudentsHtml}</tbody>
                </table>
            </div>
        </div>`;
        
        const lbl = d.classes.map(c=>`C${c.Class}-${c.Section}`);
        makeChart('ch-cm','bar',lbl,[{label:'Avg Marks',data:d.classes.map(c=>c.ClassAvgMarks),backgroundColor:'rgba(37,99,235,.75)'}]);
        makeChart('ch-ca','bar',lbl,[{label:'Attendance %',data:d.classes.map(c=>c.ClassAvgAttendance),backgroundColor:'rgba(5,150,105,.75)'}]);
        const activityColors = ['#2563eb', '#facc15', '#dc2626', '#0d9488', '#4f46e5', '#06b6d4'];
        makeChart('ch-act','doughnut',d.activities.map(a=>a.ActivityName),[{data:d.activities.map(a=>a.TotalParticipants),backgroundColor:activityColors}]);
        makeChart('ch-pass','bar',lbl,[{label:'Pass %',data:d.classes.map(c=>c.PassPercentage),backgroundColor:'rgba(79,70,229,.75)'}]);
    }

    async function searchStudent() {
        const q = document.getElementById('student-input').value.trim();
        if(!q) return;
        const el = document.getElementById('student-content');
        el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
        try {
            const r = await fetch(`${API}/student?search=${encodeURIComponent(q)}`);
            if(r.status===404) { el.innerHTML = '<div class="empty">🔍 No student found</div>'; return; }
            const d = await r.json();
            if(d.multiple) { renderMulti(d.students); return; }
            renderStudent(d);
        } catch(e) { el.innerHTML = '<div class="empty">⚠️ Connection error</div>'; }
    }

    function renderMulti(list) {
        document.getElementById('student-content').innerHTML = `<div class="fade-in"><div class="section-title">Multiple students found</div>${list.map(s=>`<div class="multi-item" onclick="loadById(${s.StudentID})"><div>${s.Name} (${s.Class}-${s.Section})</div>${badge(s.OverallGrade)}</div>`).join('')}</div>`;
    }
    async function loadById(id) { document.getElementById('student-input').value = id; await searchStudent(); }

    function renderStudent(d) {
        const p = d.profile, subjects = [...new Set(d.marks.map(m=>m.Subject))];
        const term1 = subjects.map(s=>{let m=d.marks.find(x=>x.Subject===s&&x.Term==='1st Term'); return m?m.MarksObtained:0;});
        const term2 = subjects.map(s=>{let m=d.marks.find(x=>x.Subject===s&&x.Term==='Mid Term'); return m?m.MarksObtained:0;});
        const term3 = subjects.map(s=>{let m=d.marks.find(x=>x.Subject===s&&x.Term==='Final Term'); return m?m.MarksObtained:0;});
        const totalPresent = d.attendance.reduce((s,a)=>s+a.PresentDays,0);
        const totalAbsent = d.attendance.reduce((s,a)=>s+a.AbsentDays,0);
        const months = ['January','February','March','April','May'];
        const monthlyAtt = months.map(m=>{let a=d.attendance.find(x=>x.Month===m); return a?a.AttendancePercentage:0;});
        const tavg = ['1st Term','Mid Term','Final Term'].map(t=>{let m=d.marks.filter(x=>x.Term===t); return m.length?Math.round(m.reduce((s,x)=>s+x.MarksObtained,0)/m.length):0;});
        
        // Fixed subject details table
        const subjectRows = subjects.map(sub => {
            const t1 = d.marks.find(m => m.Subject === sub && m.Term === '1st Term');
            const mt = d.marks.find(m => m.Subject === sub && m.Term === 'Mid Term');
            const ft = d.marks.find(m => m.Subject === sub && m.Term === 'Final Term');
            return `<tr>
                <td style="font-weight:500">${sub}</td>
                <td>${t1 ? t1.MarksObtained : '-'}</td>
                <td>${mt ? mt.MarksObtained : '-'}</td>
                <td><strong>${ft ? ft.MarksObtained : '-'}</strong></td>
                <td>${badge(grade(ft ? ft.MarksObtained : 0))}</td>
            </tr>`;
        }).join('');
        
        const activitiesRows = d.activities.map(a => `
            <tr>
                <td>${a.ActivityName}</td>
                <td><span style="color:${a.Participation==='Yes'?'var(--accent2)':'#cbd5e1'}">${a.Participation}</span></td>
                <td>${a.Position||'—'}</td>
            </tr>
        `).join('');
        
        document.getElementById('student-content').innerHTML = `<div class="fade-in">
            <div class="profile-card">
                <div class="avatar">${av(p.Name)}</div>
                <div><h3>${p.Name}</h3><div>ID: ${p.StudentID}</div><div class="profile-meta">Class ${p.Class}-${p.Section} | Gender ${p.Gender} | Age ${p.Age} | Avg ${p.AvgMarks}% | Attendance ${p.AvgAttendance}%</div></div>
                <div class="grade-big">${p.OverallGrade}</div>
            </div>
            <div class="grid-3">
                <div class="chart-card"><div class="section-title">📘 1st Term</div><canvas id="ch-term1"></canvas></div>
                <div class="chart-card"><div class="section-title">📙 Mid Term</div><canvas id="ch-term2"></canvas></div>
                <div class="chart-card"><div class="section-title">📕 Final Term</div><canvas id="ch-term3"></canvas></div>
            </div>
            <div class="grid-2">
                <div class="chart-card"><div class="section-title">📊 Overall Attendance</div><canvas id="ch-doughnut"></canvas></div>
                <div class="chart-card"><div class="section-title">📈 Monthly Trend</div><canvas id="ch-monthly"></canvas></div>
            </div>
            <div class="chart-card"><div class="section-title">📉 Progress Across Terms</div><canvas id="ch-progress"></canvas></div>
            <div class="grid-2">
                <div>
                    <div class="section-title">📋 Subject Details</div>
                    <div class="table-card">
                        <table>
                            <thead><tr><th>Subject</th><th>1st</th><th>Mid</th><th>Final</th><th>Grade</th></tr></thead>
                            <tbody>${subjectRows}</tbody>
                        </table>
                    </div>
                </div>
                <div>
                    <div class="section-title">🏅 Activities</div>
                    <div class="table-card">
                        <table>
                            <thead><tr><th>Activity</th><th>Participated</th><th>Position</th></tr></thead>
                            <tbody>${activitiesRows}</tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>`;
        
        makeChart('ch-term1','bar',subjects,[{label:'Marks',data:term1,backgroundColor:'rgba(37,99,235,0.7)'}]);
        makeChart('ch-term2','bar',subjects,[{label:'Marks',data:term2,backgroundColor:'rgba(5,150,105,0.7)'}]);
        makeChart('ch-term3','bar',subjects,[{label:'Marks',data:term3,backgroundColor:'rgba(217,119,6,0.7)'}]);
        makeChart('ch-doughnut','doughnut',['Present','Absent'],[{data:[totalPresent,totalAbsent],backgroundColor:['#2563eb','#dc2626']}]);
        makeChart('ch-monthly','line',months,[{label:'Attendance %',data:monthlyAtt,borderColor:'#059669',fill:true}]);
        makeChart('ch-progress','line',['1st Term','Mid Term','Final Term'],[{label:'Average',data:tavg,borderColor:'#4f46e5',fill:true}]);
    }

    async function searchClass() {
        const c = document.getElementById('class-num').value, s = document.getElementById('class-sec').value;
        if(!c||!s) { alert('Select class and section'); return; }
        const el = document.getElementById('class-content');
        el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
        try {
            const r = await fetch(`${API}/class/${c}/${s}`);
            if(r.status===404) { el.innerHTML = '<div class="empty">Class not found</div>'; return; }
            renderClass(await r.json(), c, s);
        } catch(e) { el.innerHTML = '<div class="empty">⚠️ Connection error</div>'; }
    }

    function renderClass(d, c, s) {
        const sm = d.summary;
        const hasActivities = d.activities && d.activities.length > 0;
        
        // Fixed all students table
        const allStudentsRows = d.allStudents.map(stu => `
            <tr>
                <td style="color:var(--muted)">${stu.StudentID}</td>
                <td style="cursor:pointer;color:var(--accent);font-weight:500" onclick="goToStudent('${stu.Name}')">${stu.Name}</td>
                <td>${stu.Gender}</td>
                <td><strong>${stu.AvgMarks}%</strong></td>
                <td>${stu.AvgAttendance}%</td>
                <td>${badge(stu.OverallGrade)}</td>
            </tr>
        `).join('');
        
        // Fixed top students table
        const topRows = d.topStudents.map((stu,i)=>`
            <tr>
                <td style="font-weight:700">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</td>
                <td style="font-weight:500">${stu.Name}</td>
                <td>${stu.AvgMarks}%</td>
                <td>${badge(stu.OverallGrade)}</td>
            </tr>
        `).join('');
        
        // Fixed weak students table
        const weakRows = d.weakStudents.map(stu=>`
            <tr>
                <td>${stu.Name}</td>
                <td style="color:var(--accent4);font-weight:600">${stu.AvgMarks}%</td>
                <td>${badge(stu.OverallGrade)}</td>
            </tr>
        `).join('');
        
        document.getElementById('class-content').innerHTML = `<div class="fade-in">
            <div class="kpi-grid">
                <div class="kpi-card"><div class="kpi-icon blue">👥</div><div class="kpi-label">Total Students</div><div class="kpi-value">${sm.TotalStudents}</div></div>
                <div class="kpi-card"><div class="kpi-icon green">📊</div><div class="kpi-label">Class Average</div><div class="kpi-value">${sm.ClassAvgMarks}%</div></div>
                <div class="kpi-card"><div class="kpi-icon yellow">📅</div><div class="kpi-label">Attendance</div><div class="kpi-value">${sm.ClassAvgAttendance}%</div></div>
                <div class="kpi-card"><div class="kpi-icon purple">✅</div><div class="kpi-label">Pass Rate</div><div class="kpi-value">${sm.PassPercentage}%</div></div>
            </div>
            <div class="grid-2">
                <div class="chart-card"><div class="section-title">📖 Subject Performance</div><canvas id="ch-subj-class"></canvas></div>
                <div class="chart-card"><div class="section-title">🎯 Activity Participation</div>${hasActivities ? '<canvas id="ch-act-class"></canvas>' : '<div class="empty" style="padding:20px">📭 No activity data for this class</div>'}</div>
            </div>
            <div class="grid-2">
                <div>
                    <div class="section-title">🏅 Top Students</div>
                    <div class="table-card">
                        <table>
                            <thead><tr><th>Rank</th><th>Name</th><th>Avg Marks</th><th>Grade</th></tr></thead>
                            <tbody>${topRows}</tbody>
                        </table>
                    </div>
                </div>
                <div>
                    <div class="section-title">⚠️ Needs Attention</div>
                    <div class="table-card">
                        ${d.weakStudents.length===0 ? '<div class="empty" style="padding:20px">🎉 No weak students!</div>' : `<table><thead><tr><th>Name</th><th>Avg Marks</th><th>Grade</th></tr></thead><tbody>${weakRows}</tbody></table>`}
                    </div>
                </div>
            </div>
            <div class="section-title">📋 All Students (${c}-${s})</div>
            <div class="table-card">
                <table>
                    <thead><tr><th>ID</th><th>Name</th><th>Gender</th><th>Avg Marks</th><th>Attendance</th><th>Grade</th></tr></thead>
                    <tbody>${allStudentsRows}</tbody>
                </table>
            </div>
        </div>`;
        
        makeChart('ch-subj-class','bar',d.subjects.map(x=>x.Subject),[
            {label:'Avg Marks',data:d.subjects.map(x=>x.AvgMarks),backgroundColor:'rgba(37,99,235,.75)'},
            {label:'Highest',data:d.subjects.map(x=>x.HighestMarks),backgroundColor:'rgba(5,150,105,.5)'}
        ]);
        if(hasActivities) {
            const classActColors = ['#2563eb', '#facc15', '#dc2626', '#0d9488', '#4f46e5'];
            makeChart('ch-act-class','doughnut',d.activities.map(a=>a.ActivityName),[{data:d.activities.map(a=>a.Participants),backgroundColor:classActColors}]);
        }
    }

    function goToStudent(name) { document.querySelectorAll('.nav-tab')[1].click(); document.getElementById('student-input').value = name; searchStudent(); }
    
    async function loadActivityGrid() {
        const gridContainer = document.getElementById('activity-grid');
        const contentContainer = document.getElementById('activity-content');
        gridContainer.innerHTML = '<div class="loading"><div class="spinner"></div>Loading activities...</div>';
        try {
            const list = await (await fetch(`${API}/activities`)).json();
            if (!list.length) {
                gridContainer.innerHTML = '<div class="empty">No activities found</div>';
                contentContainer.innerHTML = '<div class="empty">Select an activity to see details</div>';
                return;
            }
            gridContainer.innerHTML = list.map((act, idx) => `
                <div class="activity-card" data-activity="${act.ActivityName}" onclick="loadActivityReport('${act.ActivityName}', this)">
                    <div class="activity-card-name">${act.ActivityName}</div>
                    <div class="activity-card-stats">Click to view report</div>
                </div>
            `).join('');
            const firstCard = document.querySelector('.activity-card');
            if (firstCard) {
                firstCard.classList.add('active');
                const firstActivity = firstCard.getAttribute('data-activity');
                await loadActivityReport(firstActivity, firstCard);
            }
        } catch(e) {
            gridContainer.innerHTML = '<div class="empty">⚠️ Error loading activities</div>';
            contentContainer.innerHTML = '<div class="empty">Could not load activity data</div>';
        }
    }
    
    async function loadActivityReport(name, cardElement) {
        document.querySelectorAll('.activity-card').forEach(card => card.classList.remove('active'));
        if (cardElement) cardElement.classList.add('active');
        const contentDiv = document.getElementById('activity-content');
        contentDiv.innerHTML = '<div class="loading"><div class="spinner"></div>Loading report...</div>';
        try {
            const d = await (await fetch(`${API}/activity/${encodeURIComponent(name)}`)).json();
            renderActivity(d);
        } catch(e) {
            contentDiv.innerHTML = '<div class="empty">⚠️ Failed to load activity report</div>';
        }
    }
    
    function renderActivity(d) {
        const st = d.stats;
        const winners = d.details.filter(x => x.Position && x.Position !== 'Participant');
        const participants = d.details.filter(x => x.Participation === 'Yes');
        const container = document.getElementById('activity-content');
        container.innerHTML = `<div class="fade-in">
            <div class="kpi-grid">
                <div class="kpi-card"><div class="kpi-label">Participants</div><div class="kpi-value">${st.TotalParticipants}</div><div class="kpi-sub">/${st.TotalStudents}</div></div>
                <div class="kpi-card"><div class="kpi-label">🥇 1st</div><div class="kpi-value">${st.FirstPlace}</div></div>
                <div class="kpi-card"><div class="kpi-label">🥈 2nd</div><div class="kpi-value">${st.SecondPlace}</div></div>
                <div class="kpi-card"><div class="kpi-label">🥉 3rd</div><div class="kpi-value">${st.ThirdPlace}</div></div>
            </div>
            <div class="grid-2">
                <div class="chart-card"><div class="section-title">Class-wise Participation</div><canvas id="ch-act-classwise"></canvas></div>
                <div class="chart-card"><div class="section-title">Participation Rate</div><canvas id="ch-act-rate"></canvas></div>
            </div>
            <div class="activities-tables-wrapper">
                <div class="activities-subsection">
                    <div class="section-title">🏆 Winners</div>
                    <div class="scrollable-table table-card">
                        <table class="striped-table">
                            <thead><tr><th>Name</th><th>Class</th><th>Position</th></tr></thead>
                            <tbody>${winners.length ? winners.map(w => `<tr><td>${w.Name}</td><td>${w.Class}-${w.Section}</td><td>${w.Position}</td></tr>`).join('') : '<tr><td colspan="3" class="empty" style="text-align:center">No winners data</td></tr>'}</tbody>
                        </table>
                    </div>
                </div>
                <div class="activities-subsection">
                    <div class="section-title">👥 All Participants</div>
                    <div class="scrollable-table table-card">
                        <table class="striped-table">
                            <thead><tr><th>Name</th><th>Class</th></tr></thead>
                            <tbody>${participants.map(p => `<tr><td>${p.Name}</td><td>${p.Class}-${p.Section}</td></tr>`).join('')}</tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>`;
        makeChart('ch-act-classwise', 'bar', d.classwise.map(c => `C${c.Class}-${c.Section}`), [{ label: 'Participants', data: d.classwise.map(c => c.Participants), backgroundColor: 'rgba(37,99,235,.75)' }]);
        makeChart('ch-act-rate', 'doughnut', ['Participated', 'Did Not'], [{ data: [st.TotalParticipants, st.TotalStudents - st.TotalParticipants], backgroundColor: ['#2563eb', '#dc2626'] }]);
    }

    loadDashboard();
</script>
</body>
</html>
